name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Initialize database
        run: python -m app.db.init_db

      - name: Ruff
        run: ruff check app evals tests

      - name: Mypy
        run: mypy app evals

      - name: Pytest
        run: pytest

      - name: Docker build
        run: docker build -t business-insight-agent:ci .

  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install integration dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-integration.txt

      - name: Initialize database
        run: python -m app.db.init_db

      - name: Validate Docker Compose integration profile
        run: docker compose --profile integration config

      - name: Run optional backend integration tests
        run: pytest -m integration
